name: worldweave

services:
  worldweave:
    image: worldweave:local
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NODE_BASE_IMAGE: ${NODE_BASE_IMAGE:-node:20-slim}
        NPM_REGISTRY: ${NPM_REGISTRY:-https://registry.npmjs.org}
    restart: unless-stopped
    init: true
    mem_limit: ${WORLDWEAVE_MEM_LIMIT:-2g}
    env_file:
      - ${ENV_FILE:-.env}
    environment:
      PORT: "5000"
      HOST: 0.0.0.0
      WORLD_HOST: 0.0.0.0
      WORLD_WEB_ENABLE_HEAVY_REFRESH: "0"
      NODE_OPTIONS: ${WORLDWEAVE_NODE_OPTIONS:---max-old-space-size=1536}
    ports:
      - "127.0.0.1:${WORLDWEAVE_HOST_PORT:-5000}:5000"
    volumes:
      - worldweave-cache:/app/.cache
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          node -e "fetch('http://127.0.0.1:5000/api/v1/openclaw/skill.md',
          {signal:AbortSignal.timeout(15000)}).then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 10s
      timeout: 20s
      retries: 18
      start_period: 60s

  worldweave-refresh:
    image: worldweave:local
    restart: unless-stopped
    init: true
    mem_limit: ${WORLDWEAVE_REFRESH_MEM_LIMIT:-5g}
    env_file:
      - ${ENV_FILE:-.env}
    environment:
      NODE_OPTIONS: ${WORLDWEAVE_REFRESH_NODE_OPTIONS:---max-old-space-size=4096}
      WORLD_SOURCE_REFRESH_INTERVAL_MINUTES: ${WORLD_SOURCE_REFRESH_INTERVAL_MINUTES:-60}
      WORLD_SOURCE_REFRESH_TIMEOUT_MINUTES: ${WORLD_SOURCE_REFRESH_TIMEOUT_MINUTES:-20}
      WORLD_SOURCE_REFRESH_MANAGE_WORKER: "1"
      WORLD_SOURCE_REFRESH_WORKER_PORT: "5020"
      WORLD_SOURCE_REFRESH_WORKER_HOST: 127.0.0.1
      WORLD_CATALOG_SOURCE_FETCH_CONCURRENCY: ${WORLD_CATALOG_SOURCE_FETCH_CONCURRENCY:-4}
      WORLD_CATALOG_SOURCE_REFRESH_BATCH_SIZE: ${WORLD_CATALOG_SOURCE_REFRESH_BATCH_SIZE:-80}
      WORLD_TRANSLATION_BATCH_SIZE: ${WORLD_TRANSLATION_BATCH_SIZE:-2}
      WORLD_TRANSLATION_PRIME_LIMIT: ${WORLD_TRANSLATION_PRIME_LIMIT:-8}
      WORLD_VISIBLE_TRANSLATION_BATCH_SIZE: ${WORLD_VISIBLE_TRANSLATION_BATCH_SIZE:-12}
      WORLD_ALIGNMENT_BATCH_SIZE: ${WORLD_ALIGNMENT_BATCH_SIZE:-2}
      WORLD_ALIGNMENT_PRIME_LIMIT: ${WORLD_ALIGNMENT_PRIME_LIMIT:-4}
      WORLD_SOURCE_KNOWLEDGE_SYNC_INTERVAL_MINUTES: ${WORLD_SOURCE_KNOWLEDGE_SYNC_INTERVAL_MINUTES:-30}
      WORLD_SOURCE_KNOWLEDGE_EMBED_BATCH_SIZE: ${WORLD_SOURCE_KNOWLEDGE_EMBED_BATCH_SIZE:-3}
      WORLD_SOURCE_KNOWLEDGE_EMBED_MAX_PENDING: ${WORLD_SOURCE_KNOWLEDGE_EMBED_MAX_PENDING:-60}
    command:
      - node
      - scripts/world-source-refresh-daemon.mjs
    depends_on:
      worldweave:
        condition: service_healthy
    volumes:
      - worldweave-cache:/app/.cache
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          node -e "const fs=require('node:fs');
          for(const [f,s] of [['world-source-refresh-current.pid','world-source-refresh.mjs'],
          ['world-source-refresh-worker.pid','world-start.mjs']]){
          const p=Number(fs.readFileSync('/app/.cache/'+f,'utf8').trim());
          if(!Number.isInteger(p)||p<1)process.exit(1);process.kill(p,0);
          if(!fs.readFileSync('/proc/'+p+'/cmdline','utf8').includes(s))process.exit(1)}"
      interval: 15s
      timeout: 10s
      retries: 12
      start_period: 90s

volumes:
  worldweave-cache:
