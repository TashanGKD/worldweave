name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-${{ github.repository }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy Docker stack
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Prepare SSH private key
        shell: bash
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import base64
          import binascii
          import json
          import os
          from pathlib import Path

          raw = os.environ.get("SSH_PRIVATE_KEY", "").strip()
          candidates = [raw]

          if raw.startswith('"') and raw.endswith('"'):
              try:
                  candidates.append(json.loads(raw))
              except json.JSONDecodeError:
                  pass

          if "\\n" in raw:
              candidates.append(raw.replace("\\r", "").replace("\\n", "\n"))

          try:
              compact = "".join(raw.split())
              candidates.append(base64.b64decode(compact, validate=True).decode("utf-8"))
          except (binascii.Error, ValueError, UnicodeDecodeError):
              pass

          key = next(
              (
                  candidate.strip()
                  for candidate in candidates
                  if "\n" in candidate
                  and "-----BEGIN " in candidate
                  and "PRIVATE KEY-----" in candidate
              ),
              "",
          )
          if not key:
              raise SystemExit(
                  "::error::SSH_PRIVATE_KEY must contain the private key text, not a local path or .pub public key."
              )

          target = Path(".deploy_key")
          target.write_text(f"{key}\n", encoding="utf-8")
          target.chmod(0o600)
          PY
          if ! ssh-keygen -y -f .deploy_key >/dev/null 2>&1; then
            echo "::error::SSH_PRIVATE_KEY is not a valid unencrypted SSH private key."
            exit 1
          fi

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        env:
          REPO: ${{ github.repository }}
          DEPLOY_ENV: ${{ secrets.DEPLOY_ENV }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key_path: /github/workspace/.deploy_key
          envs: REPO,DEPLOY_ENV
          timeout: 120m
          command_timeout: 120m
          script: |
            set -Eeuo pipefail

            BASE_DIR="/var/www/github-actions/repos"
            REPO_NAME="$(basename "$REPO")"
            REPO_DIR="$BASE_DIR/$REPO_NAME"
            REPO_URL="https://github.com/${REPO}.git"

            retry() {
              local attempts="$1"
              shift
              local current=1
              until "$@"; do
                if [ "$current" -ge "$attempts" ]; then
                  return 1
                fi
                current=$((current + 1))
                sleep 5
              done
            }

            run_with_heartbeat() {
              local label="$1"
              shift
              "$@" &
              local pid="$!"
              while kill -0 "$pid" 2>/dev/null; do
                echo "[deploy] ${label} still running at $(date -u +%Y-%m-%dT%H:%M:%SZ)"
                sleep 30
              done
              wait "$pid"
            }

            check_egress() {
              local url="$1"
              local status
              status="$(curl -sS -o /dev/null -w '%{http_code}' --connect-timeout 10 --max-time 20 "$url" || true)"
              if [ -z "$status" ] || [ "$status" = "000" ]; then
                echo "::error::Target server cannot reach $url"
                exit 1
              fi
              echo "[deploy] egress $url -> HTTP $status"
            }

            wait_for_healthy() {
              local service="$1"
              local container_id=""
              local state=""
              for _ in $(seq 1 90); do
                container_id="$(docker compose ps -q "$service" 2>/dev/null || true)"
                if [ -n "$container_id" ]; then
                  state="$(docker inspect -f '{{if .State.Health}}{{.State.Health.Status}}{{else}}{{.State.Status}}{{end}}' "$container_id")"
                  if [ "$state" = "healthy" ]; then
                    echo "[deploy] $service is healthy"
                    return 0
                  fi
                  if [ "$(docker inspect -f '{{.State.Status}}' "$container_id")" = "exited" ]; then
                    break
                  fi
                fi
                sleep 5
              done
              echo "::error::$service did not become healthy (last state: ${state:-missing})"
              docker compose ps
              docker compose logs --tail=160 worldweave worldweave-refresh
              return 1
            }

            command -v docker >/dev/null
            docker compose version

            mkdir -p "$BASE_DIR"
            if [ ! -d "$REPO_DIR/.git" ]; then
              retry 3 git clone "$REPO_URL" "$REPO_DIR"
            fi

            cd "$REPO_DIR"
            git remote set-url origin "$REPO_URL"
            retry 3 git fetch --prune origin
            git reset --hard origin/main
            git clean -ffd

            if [ -z "${DEPLOY_ENV:-}" ]; then
              echo "::error::DEPLOY_ENV secret is not set. Add it in repository Actions secrets."
              exit 1
            fi

            umask 077
            printf '%s\n' "$DEPLOY_ENV" > .env

            check_egress https://registry.npmjs.org/
            check_egress https://api.scnet.cn/

            docker compose config --quiet
            run_with_heartbeat "docker compose build" docker compose build --pull
            docker compose up -d --remove-orphans

            wait_for_healthy worldweave
            wait_for_healthy worldweave-refresh

            docker compose exec -T worldweave node -e \
              "fetch('http://127.0.0.1:5000/api/v1/openclaw/skill.md',{signal:AbortSignal.timeout(30000)}).then(r=>{if(!r.ok)throw new Error('skill HTTP '+r.status);console.log('skill HTTP '+r.status)}).catch(e=>{console.error(e);process.exit(1)})"
            docker compose exec -T worldweave node -e \
              "fetch('http://127.0.0.1:5000/api/v1/world/source-knowledge/status?scene=global',{signal:AbortSignal.timeout(120000)}).then(async r=>{const body=await r.text();JSON.parse(body);if(![200,503].includes(r.status))throw new Error('source status HTTP '+r.status);console.log('source status HTTP '+r.status+(r.status===503?' (initial refresh pending)':''))}).catch(e=>{console.error(e);process.exit(1)})"

            docker image prune -f

            echo "--------------------------------------------"
            echo "WorldWeave Docker stack deployed"
            echo "Repository: $REPO"
            echo "Commit:     ${{ github.sha }}"
            echo "Local URL:  http://127.0.0.1:5000"
            echo "--------------------------------------------"

  public-smoke:
    name: Verify worldweave.tashan.chat
    needs: deploy
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Wait for public route
        env:
          BASE_URL: https://worldweave.tashan.chat
        run: |
          set -euo pipefail
          paths=(
            "/"
            "/api/v1/openclaw/skill.md"
          )
          for attempt in $(seq 1 12); do
            all_ready=1
            for path in "${paths[@]}"; do
              if ! curl --fail --silent --show-error --location --max-time 45 "${BASE_URL}${path}" >/dev/null; then
                all_ready=0
              fi
            done
            if [ "$all_ready" = "1" ]; then
              echo "WorldWeave public route is ready: $BASE_URL"
              exit 0
            fi
            echo "Public route is not ready yet (attempt $attempt/12)"
            sleep 20
          done
          echo "::error::Docker deployment completed, but ${BASE_URL} did not pass public HTTPS checks. Verify DNS, TLS, and the reverse proxy to 127.0.0.1:5000."
          exit 1
