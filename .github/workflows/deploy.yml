name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-${{ github.repository }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy Docker stack
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        env:
          REPO: ${{ github.repository }}
          DEPLOY_ENV: ${{ secrets.DEPLOY_ENV }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: REPO,DEPLOY_ENV
          timeout: 120m
          command_timeout: 120m
          script: |
            set -Eeuo pipefail

            BASE_DIR="/var/www/github-actions/repos"
            REPO_NAME="$(basename "$REPO")"
            REPO_DIR="$BASE_DIR/$REPO_NAME"
            REPO_URL="https://github.com/${REPO}.git"
            CLONE_DIR="$BASE_DIR/.${REPO_NAME}.clone"
            PREVIOUS_DIR="$BASE_DIR/.${REPO_NAME}.previous"
            export GIT_TERMINAL_PROMPT=0

            retry() {
              local attempts="$1"
              shift
              local current=1
              local status=0
              until "$@"; do
                status="$?"
                if [ "$current" -ge "$attempts" ]; then
                  echo "::error::Command failed after ${current} attempts: $1"
                  return "$status"
                fi
                echo "::warning::Command failed (attempt ${current}/${attempts}): $1; retrying in 5 seconds"
                current=$((current + 1))
                sleep 5
              done
            }

            clone_checkout() {
              local status=0
              cd "$BASE_DIR"
              rm -rf -- "$CLONE_DIR"
              timeout 180 git \
                -c http.version=HTTP/1.1 \
                -c http.lowSpeedLimit=1024 \
                -c http.lowSpeedTime=30 \
                clone \
                --depth 1 \
                --single-branch \
                --branch main \
                --no-tags \
                "$REPO_URL" \
                "$CLONE_DIR" || status="$?"
              if [ "$status" -ne 0 ]; then
                rm -rf -- "$CLONE_DIR"
                return "$status"
              fi

              rm -rf -- "$PREVIOUS_DIR"
              if [ -e "$REPO_DIR" ]; then
                mv "$REPO_DIR" "$PREVIOUS_DIR"
              fi
              if mv "$CLONE_DIR" "$REPO_DIR"; then
                rm -rf -- "$PREVIOUS_DIR"
                return 0
              fi

              if [ -e "$PREVIOUS_DIR" ] && [ ! -e "$REPO_DIR" ]; then
                mv "$PREVIOUS_DIR" "$REPO_DIR"
              fi
              return 1
            }

            fetch_checkout() {
              cd "$REPO_DIR"
              timeout 180 git \
                -c http.version=HTTP/1.1 \
                -c http.lowSpeedLimit=1024 \
                -c http.lowSpeedTime=30 \
                fetch --prune --depth 1 --no-tags origin main
            }

            run_with_heartbeat() {
              local label="$1"
              shift
              "$@" &
              local pid="$!"
              while kill -0 "$pid" 2>/dev/null; do
                echo "[deploy] ${label} still running at $(date -u +%Y-%m-%dT%H:%M:%SZ)"
                sleep 30
              done
              wait "$pid"
            }

            check_egress() {
              local url="$1"
              local status
              status="$(curl -sS -o /dev/null -w '%{http_code}' --connect-timeout 10 --max-time 20 "$url" || true)"
              if [ -z "$status" ] || [ "$status" = "000" ]; then
                echo "::error::Target server cannot reach $url"
                return 1
              fi
              echo "[deploy] egress $url -> HTTP $status"
            }

            wait_for_healthy() {
              local service="$1"
              local container_id=""
              local state=""
              for _ in $(seq 1 90); do
                container_id="$(docker compose ps -q "$service" 2>/dev/null || true)"
                if [ -n "$container_id" ]; then
                  state="$(docker inspect -f '{{if .State.Health}}{{.State.Health.Status}}{{else}}{{.State.Status}}{{end}}' "$container_id")"
                  if [ "$state" = "healthy" ]; then
                    echo "[deploy] $service is healthy"
                    return 0
                  fi
                  if [ "$(docker inspect -f '{{.State.Status}}' "$container_id")" = "exited" ]; then
                    break
                  fi
                fi
                sleep 5
              done
              echo "::error::$service did not become healthy (last state: ${state:-missing})"
              docker compose ps
              docker compose logs --tail=160 worldweave worldweave-refresh
              return 1
            }

            command -v docker >/dev/null
            command -v git >/dev/null
            command -v timeout >/dev/null
            docker compose version

            mkdir -p "$BASE_DIR"
            cd "$BASE_DIR"
            retry 3 check_egress https://github.com/

            if [ -d "$REPO_DIR/.git" ]; then
              git -C "$REPO_DIR" remote set-url origin "$REPO_URL"
              if retry 3 fetch_checkout; then
                cd "$REPO_DIR"
                git reset --hard FETCH_HEAD
              else
                echo "::warning::Existing checkout could not be refreshed; replacing it with a clean shallow clone."
                cd "$BASE_DIR"
                retry 3 clone_checkout
              fi
            else
              retry 3 clone_checkout
            fi

            cd "$REPO_DIR"
            git clean -ffd

            if [ -z "${DEPLOY_ENV:-}" ]; then
              echo "::error::DEPLOY_ENV secret is not set. Add it in repository Actions secrets."
              exit 1
            fi

            umask 077
            printf '%s\n' "$DEPLOY_ENV" > .env

            check_egress https://registry.npmjs.org/
            check_egress https://api.scnet.cn/

            docker compose config --quiet
            run_with_heartbeat "docker compose build" docker compose build --pull
            docker compose up -d --remove-orphans

            wait_for_healthy worldweave
            wait_for_healthy worldweave-refresh

            docker compose exec -T worldweave node scripts/check-runtime-egress.mjs
            docker compose exec -T worldweave-refresh node scripts/check-runtime-egress.mjs

            docker compose exec -T worldweave node -e \
              "fetch('http://127.0.0.1:5000/api/v1/openclaw/skill.md',{signal:AbortSignal.timeout(30000)}).then(r=>{if(!r.ok)throw new Error('skill HTTP '+r.status);console.log('skill HTTP '+r.status)}).catch(e=>{console.error(e);process.exit(1)})"
            docker compose exec -T worldweave node -e \
              "fetch('http://127.0.0.1:5000/api/v1/world/source-knowledge/status?scene=global',{signal:AbortSignal.timeout(120000)}).then(async r=>{const body=await r.text();JSON.parse(body);if(![200,503].includes(r.status))throw new Error('source status HTTP '+r.status);console.log('source status HTTP '+r.status+(r.status===503?' (initial refresh pending)':''))}).catch(e=>{console.error(e);process.exit(1)})"

            docker image prune -f

            echo "--------------------------------------------"
            echo "WorldWeave Docker stack deployed"
            echo "Repository: $REPO"
            echo "Commit:     ${{ github.sha }}"
            echo "Local URL:  http://127.0.0.1:3020"
            echo "--------------------------------------------"

  public-smoke:
    name: Verify worldweave.tashan.chat
    needs: deploy
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Wait for public route
        env:
          BASE_URL: https://worldweave.tashan.chat
        run: |
          set -euo pipefail
          paths=(
            "/"
            "/api/v1/openclaw/skill.md"
          )
          for attempt in $(seq 1 12); do
            all_ready=1
            for path in "${paths[@]}"; do
              if ! curl --fail --silent --show-error --location --max-time 45 "${BASE_URL}${path}" >/dev/null; then
                all_ready=0
              fi
            done
            if [ "$all_ready" = "1" ]; then
              echo "WorldWeave public route is ready: $BASE_URL"
              exit 0
            fi
            echo "Public route is not ready yet (attempt $attempt/12)"
            sleep 20
          done
          echo "::error::Docker deployment completed, but ${BASE_URL} did not pass public HTTPS checks. Verify DNS, TLS, and the reverse proxy to 127.0.0.1:3020."
          exit 1
