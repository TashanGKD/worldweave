name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Test and build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9.0.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run unit tests
        run: pnpm run test

      - name: Type check
        run: pnpm run ts-check

      - name: Build
        run: pnpm run build

  docker:
    name: Validate Docker deployment
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Validate Compose configuration
        env:
          ENV_FILE: .env.example
        run: docker compose --env-file .env.example config --quiet

      - name: Build deployment image
        env:
          ENV_FILE: .env.example
        run: docker compose --env-file .env.example build worldweave
